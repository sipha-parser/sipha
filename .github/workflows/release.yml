name: Release to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Publish sipha-macros
        run: cargo publish -p sipha-macros --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish sipha
        run: cargo publish -p sipha --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish sipha-analysis
        run: cargo publish -p sipha-analysis --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish sipha-display
        run: cargo publish -p sipha-display --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish sipha-sourcemap
        run: cargo publish -p sipha-sourcemap --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish sipha-fmt
        run: cargo publish -p sipha-fmt --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish sipha-diff
        run: cargo publish -p sipha-diff --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
