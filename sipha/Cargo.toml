[package]
name = "sipha"
version = "1.0.0"
edition = "2021"

[lints]
workspace = true

[features]
default = ["walk"]
walk = []
emit = ["walk"]
transform = []
miette = ["dep:miette"]
utf16 = []

[dependencies]
sipha-macros = { path = "../sipha-macros" }
miette = { version = "7", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[example]]
name = "miette_errors"
required-features = ["miette"]

[[bench]]
name = "parse"
harness = false
